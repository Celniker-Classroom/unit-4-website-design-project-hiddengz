<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carsons Very Epic Games</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 2rem;
        background: #b3d7ff;
      }
      nav ul {
        list-style: none;
        padding: 0;
        max-width: 900px;
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
      }
      nav li {
        width: 200px;
      }
      .game-card {
        display: block;
        border: 2px solid #0066cc;
        border-radius: 12px;
        background: #ffffff;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        color: #003366;
        text-decoration: none;
        padding: 0.75rem;
      }
      .game-card:hover {
        border-color: #004999;
        background: #eaf6ff;
      }
      .game-card .game-title {
        display: block;
        text-align: center;
        font-size: 1.1rem;
        font-weight: bold;
        margin-bottom: 0.6rem;
      }
      .game-card .game-image {
        display: block;
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <h1>Carsons Very Epic Games</h1>
    <p>Click one of the links below to go to a game</p>

    <nav>
      <ul>
        <li>
          <a class="game-card" href="subpage1.html">
            <span class="game-title">Flappy Bird</span>
            <img class="game-image" src="image/FlappyBird.webp" alt="Flappy Bird" />
          </a>
        </li>
        <li>
          <a class="game-card" href="subpage2.html">
            <span class="game-title">Titan Attack</span>
            <img class="game-image" src="image/TitanAttack.png" alt="Titan Attack" />
          </a>
        </li>
        <li>
          <a class="game-card" href="subpage3.html">
            <span class="game-title">Dino Game</span>
            <img class="game-image" src="image/Dino.webp" alt="Mars Lander" />
          </a>
        </li>
        <li>
          <a class="game-card" href="subpage4.html">
            <span class="game-title">Space Invaders</span>
            <img class="game-image" src="image/SpaceInvade.jpg" alt="Space Invaders" />
          </a>
        </li>
      </ul>
    </nav>
  </body>
</html>
