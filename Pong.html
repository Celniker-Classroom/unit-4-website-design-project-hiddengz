<!DOCTYPE html>
<html>
<head>
    <title>Pong in One File</title>
    <style>
        body { margin: 0; padding: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { border: 2px solid white; }
    </style>
</head>
<body>
<canvas id="gameCanvas" width="800" height="600"></canvas>
<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // Game Objects
    const paddleWidth = 10, paddleHeight = 100;
    let p1Y = p2Y = (canvas.height - paddleHeight) / 2;
    let ballX = canvas.width / 2, ballY = canvas.height / 2;
    let ballVX = 5, ballVY = 5;
    let p1Score = 0, p2Score = 0;

    // Control
    const keys = {};
    window.addEventListener("keydown", e => keys[e.key] = true);
    window.addEventListener("keyup", e => keys[e.key] = false);

    function update() {
        // Paddle movement
        if (keys['w'] && p1Y > 0) p1Y -= 7;
        if (keys['s'] && p1Y < canvas.height - paddleHeight) p1Y += 7;
        if (keys['ArrowUp'] && p2Y > 0) p2Y -= 7;
        if (keys['ArrowDown'] && p2Y < canvas.height - paddleHeight) p2Y += 7;

        // Ball movement
        ballX += ballVX;
        ballY += ballVY;

        // Wall collision
        if (ballY <= 0 || ballY >= canvas.height) ballVY = -ballVY;

        // Paddle collision
        if (ballX <= paddleWidth) {
            if (ballY > p1Y && ballY < p1Y + paddleHeight) ballVX = -ballVX;
            else resetBall();
        }
        if (ballX >= canvas.width - paddleWidth) {
            if (ballY > p2Y && ballY < p2Y + paddleHeight) ballVX = -ballVX;
            else resetBall();
        }
    }

    function resetBall() {
        if(ballX < 0) p2Score++; else p1Score++;
        ballX = canvas.width / 2; ballY = canvas.height / 2;
        ballVX = -ballVX;
    }

    function draw() {
        // Background
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Paddles and Ball
        ctx.fillStyle = "white";
        ctx.fillRect(0, p1Y, paddleWidth, paddleHeight); // P1
        ctx.fillRect(canvas.width - paddleWidth, p2Y, paddleWidth, paddleHeight); // P2
        ctx.fillRect(ballX - 5, ballY - 5, 10, 10); // Ball

        // Score
        ctx.font = "30px Arial";
        ctx.fillText(p1Score, canvas.width / 4, 50);
        ctx.fillText(p2Score, 3 * canvas.width / 4, 50);
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }
    gameLoop();
</script>
</body>
</html>
