<!DOCTYPE html>
<html>
<head>
    <title>Mars Lander</title>
    <style>
        body { margin: 0; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: monospace; }
        canvas { border: 2px solid #555; background: #000; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        Fuel: <span id="fuel">100</span><br>
        Speed: <span id="speed">0</span><br>
        <span id="msg"></span>
    </div>
    <canvas id="gameCanvas" width="800" height="500"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const fuelDisplay = document.getElementById('fuel');
    const speedDisplay = document.getElementById('speed');
    const msgDisplay = document.getElementById('msg');

    // Game State
    let lander = { x: 100, y: 50, vx: 2, vy: 0, rot: 0, fuel: 100, landed: false, crashed: false };
    let gravity = 0.05;
    let thrust = 0.1;
    let keys = {};
    let landingPad = { x: 600, y: 450, w: 100 };

    window.onkeydown = e => keys[e.key] = true;
    window.onkeyup = e => keys[e.key] = false;

    function update() {
        if (lander.landed || lander.crashed) return;

        // Physics
        lander.vy += gravity;
        if (keys['ArrowLeft']) lander.rot -= 0.05;
        if (keys['ArrowRight']) lander.rot += 0.05;
        if (keys['ArrowUp'] && lander.fuel > 0) {
            lander.vx += Math.sin(lander.rot) * thrust;
            lander.vy -= Math.cos(lander.rot) * thrust;
            lander.fuel -= 0.5;
        }
        
        lander.x += lander.vx;
        lander.y += lander.vy;
        
        // Boundaries
        if (lander.x < 0) lander.x = canvas.width;
        if (lander.x > canvas.width) lander.x = 0;

        // Collision Detection
        if (lander.y > canvas.height - 20) {
            if (lander.x > landingPad.x && lander.x < landingPad.x + landingPad.w &&
                Math.abs(lander.vy) < 2 && Math.abs(lander.vx) < 1 && Math.abs(lander.rot) < 0.2) {
                lander.landed = true;
                msgDisplay.innerText = "SAFE LANDING!";
            } else {
                lander.crashed = true;
                msgDisplay.innerText = "CRASHED!";
            }
        }

        // Update UI
        fuelDisplay.innerText = Math.max(0, Math.floor(lander.fuel));
        speedDisplay.innerText = Math.sqrt(lander.vx**2 + lander.vy**2).toFixed(1);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Surface
        ctx.strokeStyle = '#964B00';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, 480);
        ctx.lineTo(landingPad.x, 480);
        ctx.strokeStyle = 'white';
        ctx.lineTo(landingPad.x + landingPad.w, 480);
        ctx.strokeStyle = '#964B00';
        ctx.lineTo(canvas.width, 480);
        ctx.stroke();

        // Draw Lander
        ctx.save();
        ctx.translate(lander.x, lander.y);
        ctx.rotate(lander.rot);
        ctx.fillStyle = lander.crashed ? 'red' : 'white';
        ctx.fillRect(-10, -10, 20, 20); // Body
        if (keys['ArrowUp'] && !lander.crashed) {
            ctx.fillStyle = 'orange';
            ctx.fillRect(-5, 10, 10, 15);
        }
        ctx.restore();
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    loop();
</script>
</body>
</html>
